apiVersion: 1

datasources:

  # ── Loki — structured log lines ────────────────────────────────────────────
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      # When viewing a trace in Tempo, Grafana will offer a "Logs for this
      # trace" button that runs the query below against Loki.
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo

  # ── Tempo — OTel distributed traces ────────────────────────────────────────
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Clicking a trace_id in Loki logs jumps to the full trace in Tempo.
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        customQuery: true
        query: '{job="echosql"} | json | trace_id=~"$${__trace.traceId}"'
      # Enable the "Search" tab in Tempo to find traces by service / span name.
      lokiSearch:
        datasourceUid: loki
      serviceMap:
        datasourceUid: loki
