server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Application logs (backend/logs/app.jsonl) ──────────────────────────────
  # Every log line emitted by the FastAPI backend: query lifecycle events,
  # cache hits/misses, LLM completions, DB execution, errors, etc.
  - job_name: echosql-app
    static_configs:
      - targets: [localhost]
        labels:
          job: echosql
          log_type: app
          __path__: /logs/app.jsonl
    pipeline_stages:
      - json:
          expressions:
            level:  level    # INFO / WARNING / ERROR
            event:  event    # query.start / llm.complete / db.complete / …
            logger: logger   # routes.query / services.llm_service / …
      - labels:
          level:
          event:
          logger:
      - timestamp:
          source: ts
          format: RFC3339Nano

  # ── OTel span records (backend/logs/traces.jsonl) ──────────────────────────
  # Completed spans written by observability.py's custom exporter.
  # Each record contains trace_id, span name, duration_ms, and attributes.
  - job_name: echosql-spans
    static_configs:
      - targets: [localhost]
        labels:
          job: echosql
          log_type: spans
          __path__: /logs/traces.jsonl
    pipeline_stages:
      - json:
          expressions:
            name:   name     # echosql.cache.nl_lookup / echosql.db.execute / …
            status: status   # OK / ERROR
      - labels:
          name:
          status:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
